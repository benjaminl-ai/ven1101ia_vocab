<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEN1101 IA System v2.0 - FULL VERSION</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --neon-blue: #38bdf8;
            --neon-purple: #a855f7;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
            --neon-gold: #f59e0b;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 800px; padding-bottom: 160px; }

        header h1 { 
            text-align: center; 
            font-size: 1.1rem; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin: 15px 0;
        }

        .tabs {
            display: flex; gap: 5px; position: sticky; top: 0;
            background: rgba(15, 23, 42, 0.9); padding: 10px 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1; padding: 10px 5px; border: 1px solid var(--neon-blue); 
            background: transparent; color: var(--neon-blue);
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.75rem;
            transition: all 0.3s; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .tab-btn.active { 
            background: var(--neon-blue); color: var(--bg-dark); 
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .tab-btn#btn-challenge { border-color: var(--neon-gold); color: var(--neon-gold); }
        .tab-btn.challenge-active { 
            background: var(--neon-gold); color: var(--bg-dark); 
            box-shadow: 0 0 15px var(--neon-gold);
        }

        .category-hd { 
            border-left: 4px solid var(--neon-purple);
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), transparent);
            color: var(--neon-purple); padding: 5px 12px; 
            margin: 20px 0 10px 0; font-size: 0.8rem; font-weight: bold;
            text-transform: uppercase;
        }

        .item-list { display: grid; gap: 10px; }
        .item-row {
            background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 12px 18px; border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .item-row:hover { 
            background: rgba(56, 189, 248, 0.1); 
            border-color: var(--neon-blue);
            transform: translateX(5px);
        }
        
        .eng-txt { font-weight: bold; color: var(--neon-blue); font-size: 1rem; }
        .chi-txt { color: #94a3b8; font-size: 0.85rem; }

        .challenge-container {
            text-align: center; padding: 50px 20px;
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid var(--neon-gold); border-radius: 8px;
            margin-top: 20px;
        }
        .challenge-btn {
            background: var(--neon-gold); color: var(--bg-dark); border: none;
            padding: 15px 40px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; clip-path: polygon(0 20%, 10% 0, 100% 0, 100% 80%, 90% 100%, 0 100%);
            box-shadow: 0 5px 0 #b45309; transition: 0.1s;
        }
        .challenge-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b45309; }

        .practice-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1e293b; border-top: 3px solid var(--neon-blue);
            padding: 20px; display: none; z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .panel-content { max-width: 600px; margin: 0 auto; text-align: center; }
        .target-display { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); margin-bottom: 5px; }
        .target-translation { font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; font-style: italic; }

        .btn-group { display: flex; justify-content: center; gap: 10px; }
        .action-btn {
            padding: 12px 20px; border-radius: 4px; border: 1px solid #475569;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;
            background: #334155; color: white; text-transform: uppercase; font-size: 0.75rem;
        }
        .btn-listen { border-color: var(--neon-blue); color: var(--neon-blue); }
        .btn-record { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-record.recording { background: var(--neon-red); color: white; border-color: white; animation: blink 0.5s infinite; }

        .feedback { margin-top: 15px; font-size: 0.9rem; font-weight: bold; min-height: 1.5em; text-transform: uppercase; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>VEN1101 IA System v2.0</h1></header>

    <div class="tabs">
        <button class="tab-btn active" id="btn-vocab" onclick="showSection('vocab')">Inventory</button>
        <button class="tab-btn" id="btn-exp" onclick="showSection('exp')">Skills</button>
        <button class="tab-btn" id="btn-challenge" onclick="showSection('challenge')">Challenge Yourself! 💪</button>
    </div>

    <div id="vocab-section">
        <div class="category-hd">Calendar / Month</div><div id="list-month" class="item-list"></div>
        <div class="category-hd">Duty / Training</div><div id="list-duty" class="item-list"></div>
        <div class="category-hd">Action Commands</div><div id="list-verb" class="item-list"></div>
        <div class="category-hd">Items / Noun</div><div id="list-noun" class="item-list"></div>
    </div>

    <div id="exp-section" class="hidden">
        <div class="category-hd">1) Greeting</div><div id="exp-1" class="item-list"></div>
        <div class="category-hd">2) Asking Information</div><div id="exp-2" class="item-list"></div>
        <div class="category-hd">3) Making Requests</div><div id="exp-3" class="item-list"></div>
        <div class="category-hd">4) Responding</div><div id="exp-4" class="item-list"></div>
        <div class="category-hd">5) Closing</div><div id="exp-5" class="item-list"></div>
        <div class="category-hd">6) Clarification</div><div id="exp-6" class="item-list"></div>
    </div>

    <div id="challenge-section" class="hidden">
        <div class="challenge-container">
            <button class="challenge-btn" onclick="getRandomChallenge()">START RANDOM QUEST</button>
            <p style="color: var(--neon-gold); font-size: 0.8rem; letter-spacing: 1px; margin-top: 15px;">COMBINE VOCAB & SKILLS TO LEVEL UP!</p>
        </div>
    </div>
</div>

<div id="practice-panel" class="practice-panel">
    <div class="panel-content">
        <div id="target-display" class="target-display">MISSION TARGET</div>
        <div id="target-translation" class="target-translation">Translation</div>
        <div id="feedback-text" class="feedback"></div>
        <div class="btn-group">
            <button class="action-btn btn-listen" onclick="speakText()">🔊 AUDIO</button>
            <button id="record-btn" class="action-btn btn-record" onclick="startRecognition()">🎤 VOICE INPUT</button>
            <button class="action-btn" onclick="closePanel()">✕ EXIT</button>
        </div>
    </div>
</div>

<script>
    const vocabData = {
        month: [{en: "January", zh: "一月"}, {en: "February", zh: "二月"}, {en: "March", zh: "三月"}, {en: "April", zh: "四月"}, {en: "May", zh: "五月"}, {en: "June", zh: "六月"}],
        duty: [{en: "Dinner meeting", zh: "晚餐會議"}, {en: "English speaking course", zh: "英語會話課程"}, {en: "Fashion show", zh: "時裝表演"}, {en: "Food expo", zh: "食品博覽會"}, {en: "Food test", zh: "食品檢測"}, {en: "IT course", zh: "資訊科技課程"}, {en: "Music show", zh: "音樂表演"}, {en: "New products training", zh: "新產品培訓"}, {en: "New services training", zh: "新服務培訓"}, {en: "Safety workshop", zh: "安全工作坊"}, {en: "Sales training", zh: "銷售培訓"}, {en: "Staff meeting", zh: "員工會議"}, {en: "Trade talk", zh: "貿易講座"}, {en: "Yoga workshop", zh: "瑜伽工作坊"}],
        verb: [{en: "ask", zh: "詢問"}, {en: "book", zh: "預訂"}, {en: "bring", zh: "帶"}, {en: "check", zh: "檢查"}, {en: "confirm", zh: "確認"}, {en: "copy", zh: "影印"}, {en: "design", zh: "設計"}, {en: "download", zh: "下載"}, {en: "email", zh: "發送電郵"}, {en: "get", zh: "取得"}, {en: "meet", zh: "約見"}, {en: "order", zh: "訂購"}, {en: "prepare", zh: "準備"}, {en: "print", zh: "列印"}, {en: "send", zh: "傳送"}, {en: "set up", zh: "建立"}, {en: "tell", zh: "告訴"}, {en: "write", zh: "寫"}],
        noun: [{en: "booth", zh: "攤位"}, {en: "café", zh: "咖啡店"}, {en: "checklist", zh: "檢查清單"}, {en: "drinks", zh: "飲品"}, {en: "equipment", zh: "設備"}, {en: "floor plan", zh: "平面圖"}, {en: "handout", zh: "講義"}, {en: "key", zh: "鎖匙"}, {en: "list", zh: "清單"}, {en: "menu", zh: "選單"}, {en: "people", zh: "人們"}, {en: "poster", zh: "海報"}, {en: "room", zh: "房間"}, {en: "rundown", zh: "流程表"}, {en: "samples", zh: "樣本"}, {en: "table", zh: "檯"}, {en: "tomorrow", zh: "明天"}, {en: "tools", zh: "工具"}]
    };

    const expData = {
        1: [{en: "Hello. May I help you?", zh: "你好。有什麼我可以幫你嗎？"}, {en: "Hi. Do you need help?", zh: "你好。你需要幫忙嗎？"}],
        2: [{en: "Can you tell me the date of the ...?", zh: "你能告訴我...的日期嗎？"}, {en: "May I know the location of the ...?", zh: "我可以知道...的地點嗎？"}],
        3: [{en: "Could you please ...?", zh: "能否請你...？"}, {en: "Can you please ...?", zh: "可以請你...嗎？"}, {en: "Would you please ...?", zh: "你願意...嗎？"}],
        4: [{en: "Yes. Sure. I'll...", zh: "好的。沒問題。我會..."}, {en: "Of course. I will...", zh: "當然。我會..."}, {en: "OK. I will ...", zh: "好。我會..."}],
        5: [{en: "You're welcome. Goodbye", zh: "不客氣。再見。"}],
        6: [{en: "Sorry. I missed that. Could you repeat that, please?", zh: "抱歉。我聽不清楚。可以請你重複一遍嗎？"}, {en: "May I beg your pardon?", zh: "請再說一遍好嗎？"}, {en: "Sorry. Can you say it again, please?", zh: "抱歉。可以請你再說一次嗎？"}]
    };

    // 完整的 50 句挑戰
    const challenges = [
        {en: "Can you tell me the date of the dinner meeting?", zh: "你能告訴我晚餐會議的日期嗎？"},
        {en: "May I know the location of the music show?", zh: "我可以知道音樂表演的地點嗎？"},
        {en: "Could you please check the floor plan?", zh: "能否請你檢查一下平面圖？"},
        {en: "Yes. Sure. I'll book the room for you.", zh: "好的，沒問題。我會為你預訂房間。"},
        {en: "Can you tell me the time of the IT course?", zh: "你能告訴我資訊科技課程的時間嗎？"},
        {en: "Would you please bring the samples to the booth?", zh: "你願意把樣本帶到攤位嗎？"},
        {en: "Of course. I will confirm the date in April.", zh: "當然。我會在四月份確認日期。"},
        {en: "May I know the location of the booth?", zh: "我可以知道攤位的位置嗎？"},
        {en: "Could you please send the checklist tomorrow?", zh: "能否請你明天發送檢查清單？"},
        {en: "OK. I will print the handout for the meeting.", zh: "好。我會為會議列印講義。"},
        {en: "Can you tell me the date of the fashion show?", zh: "你能告訴我時裝表演的日期嗎？"},
        {en: "Could you please prepare the tools?", zh: "能否請你準備一下工具？"},
        {en: "Yes. Sure. I'll email the list tonight.", zh: "好的，沒問題。我今晚會發送電郵。"},
        {en: "May I know the location of the food expo?", zh: "我可以知道食品博覽會的地點嗎？"},
        {en: "Would you please set up the table in the café?", zh: "你願意在咖啡店擺放桌子嗎？"},
        {en: "Of course. I will check the drinks for you.", zh: "當然。我會為你檢查飲品。"},
        {en: "Can you tell me the time of the sales training?", zh: "你能告訴我銷售培訓的時間嗎？"},
        {en: "Could you please write the inquiry email?", zh: "能否請你寫一封查詢電郵？"},
        {en: "OK. I will get the key for the room.", zh: "好。我會去拿房間的鎖匙。"},
        {en: "Can you please download the rundown now?", zh: "可以請你現在下載流程表嗎？"},
        {en: "May I know the location of the yoga workshop?", zh: "我可以知道瑜伽工作坊的地點嗎？"},
        {en: "Could you please tell me the location of the café?", zh: "能否請你告訴我咖啡店的位置？"},
        {en: "Of course. I will design the poster for you.", zh: "當然。我會為你設計海報。"},
        {en: "Can you tell me the date of the staff meeting in March?", zh: "你能告訴我三月份員工會議的日期嗎？"},
        {en: "Would you please check the equipment for the training?", zh: "可以請你檢查一下培訓用的設備嗎？"},
        {en: "Yes. Sure. I'll bring the tools tomorrow.", zh: "好的，沒問題。我明天會帶工具來。"},
        {en: "May I know the location of the safety workshop?", zh: "我可以知道安全工作坊的地點嗎？"},
        {en: "Could you please book the IT course in February?", zh: "能否請你在二月份預訂資訊科技課程？"},
        {en: "OK. I will copy the floor plan for the team.", zh: "好。我會為團隊影印平面圖。"},
        {en: "Can you tell me the date of the food test?", zh: "你能告訴我食品檢測的日期嗎？"},
        {en: "Would you please print the menu for the booth?", zh: "可以請你為攤位列印選單嗎？"},
        {en: "Of course. I will send the samples to the café.", zh: "當然。我會把樣本送到咖啡店。"},
        {en: "May I know the location of the trade talk in January?", zh: "我可以知道一月份貿易講座的地點嗎？"},
        {en: "Could you please order the drinks for the people?", zh: "能否請你為大家訂購飲品？"},
        {en: "Yes. Sure. I'll meet you in June.", zh: "好的，沒問題。我會在六月份與你見面。"},
        {en: "Can you tell me the time of the new products training?", zh: "你能告訴我新產品培訓的時間嗎？"},
        {en: "Would you please download the list tonight?", zh: "可以請你今晚下載清單嗎？"},
        {en: "OK. I will prepare the room for the training.", zh: "好。我會為培訓準備房間。"},
        {en: "May I know the location of the fashion show in May?", zh: "我可以知道五月份時裝表演的地點嗎？"},
        {en: "Could you please check the drinks for the food expo?", zh: "能否請你檢查一下食品博覽會的飲品？"},
        {en: "Of course. I will write the email for the new services.", zh: "當然。我會寫關於新服務的電郵。"},
        {en: "Can you tell me the date of the yoga workshop in April?", zh: "你能告訴我四月份瑜伽工作坊的日期嗎？"},
        {en: "Would you please bring the key to the staff meeting?", zh: "可以請你把鎖匙帶到員工會議嗎？"},
        {en: "Yes. Sure. I'll set up the equipment now.", zh: "好的，沒問題。我現在就架設設備。"},
        {en: "May I know the location of the English speaking course?", zh: "我可以知道英語會話課程的地點嗎？"},
        {en: "Could you please tell me the location of the room?", zh: "能否請你告訴我房間在哪裡？"},
        {en: "OK. I will book the dinner meeting for you.", zh: "好。我會為你預訂晚餐會議。"},
        {en: "Can you tell me the date of the trade talk?", zh: "你能告訴我貿易講座的日期嗎？"},
        {en: "Would you please confirm the list tomorrow?", zh: "可以請你明天確認清單嗎？"},
        {en: "Of course. I will prepare the handout for you.", zh: "當然。我會為你準備講義。"}
    ];

    let currentTarget = "";
    let recognition;

    function render() {
        for (const cat in vocabData) {
            const container = document.getElementById(`list-${cat}`);
            vocabData[cat].forEach(item => {
                container.innerHTML += `<div class="item-row" onclick="openPractice('${item.en}', '${item.zh}')">
                    <span class="eng-txt">${item.en}</span><span class="chi-txt">${item.zh}</span></div>`;
            });
        }
        for (let i = 1; i <= 6; i++) {
            const container = document.getElementById(`exp-${i}`);
            expData[i].forEach(item => {
                container.innerHTML += `<div class="item-row" onclick="openPractice('${item.en}', '${item.zh}')">
                    <span class="eng-txt">${item.en}</span><span class="chi-txt">${item.zh}</span></div>`;
            });
        }
    }

    function showSection(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'challenge-active'));
        const btn = document.getElementById(`btn-${type}`);
        if(type === 'challenge') btn.classList.add('challenge-active');
        else btn.classList.add('active');

        document.getElementById('vocab-section').classList.toggle('hidden', type !== 'vocab');
        document.getElementById('exp-section').classList.toggle('hidden', type !== 'exp');
        document.getElementById('challenge-section').classList.toggle('hidden', type !== 'challenge');
        closePanel();
    }

    function getRandomChallenge() {
        const randomItem = challenges[Math.floor(Math.random() * challenges.length)];
        openPractice(randomItem.en, randomItem.zh);
    }

    function openPractice(en, zh) {
        currentTarget = en;
        document.getElementById('target-display').innerText = en;
        document.getElementById('target-translation').innerText = zh;
        document.getElementById('practice-panel').style.display = 'block';
        document.getElementById('feedback-text').innerText = "SYSTEM WAITING...";
        document.getElementById('feedback-text').style.color = "white";
    }

    function closePanel() { 
        if(recognition) recognition.stop();
        document.getElementById('practice-panel').style.display = 'none'; 
    }

    function speakText() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(currentTarget);
        u.lang = 'en-US';
        u.rate = 0.85;
        window.speechSynthesis.speak(u);
    }

    function startRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) return alert("SPEECH SYSTEM ERROR");
        recognition = new SR();
        recognition.lang = 'en-US';
        
        const btn = document.getElementById('record-btn');
        const feedback = document.getElementById('feedback-text');
        
        recognition.onstart = () => { btn.classList.add('recording'); feedback.innerText = "LISTENING..."; };
        
        recognition.onresult = (e) => {
            recognition.stop(); 
            const result = e.results[0][0].transcript.toLowerCase().trim().replace(/[.?]/g,"");
            const target = currentTarget.toLowerCase().trim().replace(/[.?]/g,"");
            
            if(result === target) {
                feedback.style.color = "#22c55e";
                feedback.innerText = "SUCCESS! LEVEL UP.";
            } else {
                feedback.style.color = "#ef4444";
                feedback.innerHTML = `FAILED. YOU SAID: <br><span style="color:white; font-size:0.75rem;">"${e.results[0][0].transcript}"</span>`;
            }
        };

        recognition.onend = () => { btn.classList.remove('recording'); };
        recognition.onerror = () => { recognition.stop(); btn.classList.remove('recording'); };
        recognition.start();
    }

    render();
</script>
</body>
</html>
