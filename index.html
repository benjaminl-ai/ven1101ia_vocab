<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEN1101 IA Practice Tool</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .practice-card {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .target-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            min-height: 1.6em;
        }

        .category-label {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button.action-btn {
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        button.action-btn:active { transform: scale(0.95); }

        .btn-listen { background: #dbeafe; color: var(--primary); }
        .btn-record { background: var(--primary); color: white; }
        .btn-record.recording { background: #ef4444; animation: pulse 1.5s infinite; }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>VEN1101 IA Practice</h1>
        <div id="progress">Progress: 0 / 0</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('vocab')">Vocabulary</button>
        <button class="tab-btn" onclick="switchTab('exp')">Expressions</button>
    </div>

    <div class="practice-card">
        <div id="category" class="category-label">Target</div>
        <div id="display-text" class="target-text">Loading...</div>
        
        <div id="feedback-box" class="feedback"></div>

        <div class="controls">
            <button class="action-btn btn-listen" onclick="speakText()">
                <span>🔊</span> Listen
            </button>
            <button id="record-btn" class="action-btn btn-record" onclick="toggleRecord()">
                <span>🎤</span> Record
            </button>
        </div>
    </div>

    <div class="nav-controls">
        <button class="tab-btn" onclick="prevItem()">← Previous</button>
        <button class="tab-btn" onclick="nextItem()">Next →</button>
    </div>
</div>

<script>
    // --- Data Storage ---
    // 請將 56 個單字放入此陣列
    const vocabList = [
        "Accommodation", "Reservation", "Itinerary", "Destination", "Departure",
        "Arrival", "Passport", "Insurance", "Concierge", "Sightseeing",
        "Transportation", "Budget", "Confirmation", "Check-in", "Check-out",
        "Facility", "Amenity", "Requirement", "Preference", "Recommendation",
        "Assistance", "Inquiry", "Validation", "Excursion", "Terminal",
        "Transaction", "Registration", "Inventory", "Schedule", "Arrangement",
        "Attraction", "Beverage", "Complimentary", "Currency", "Customs",
        "Delayed", "Embassy", "Equipment", "Experience", "Information",
        "Knowledge", "Luggage", "Maintenance", "Management", "Negotiation",
        "Opportunity", "Participant", "Personnel", "Procedure", "Reception",
        "Regulation", "Representative", "Responsibility", "Satisfaction", "Strategy", "Voucher"
    ].map(word => ({ text: word, cat: "Vocabulary" }));

    const expressionList = [
        { cat: "Greeting", text: "Hello. May I help you?" },
        { cat: "Greeting", text: "Hi. Do you need help?" },
        { cat: "Asking for info", text: "Can you tell me the date of the event?" },
        { cat: "Asking for info", text: "May I know the location of the meeting?" },
        { cat: "Making requests", text: "Could you please help me with this?" },
        { cat: "Responding", text: "Yes. Sure. I'll do that." },
        { cat: "Responding", text: "Of course. I will check for you." },
        { cat: "Closing", text: "You're welcome. Goodbye." },
        { cat: "Clarification", text: "Sorry. I missed that. Could you repeat that, please?" },
        { cat: "Clarification", text: "May I beg your pardon?" }
    ];

    let currentMode = 'vocab';
    let currentIndex = 0;
    let recognition;
    let isRecording = false;

    // --- Core Logic ---

    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Your browser does not support Speech Recognition. Please use Chrome/Safari.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
            const target = getCurrentData()[currentIndex].text.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"");
            
            showFeedback(transcript, target);
        };

        recognition.onend = () => {
            isRecording = false;
            document.getElementById('record-btn').classList.remove('recording');
        };
    }

    function switchTab(mode) {
        currentMode = mode;
        currentIndex = 0;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        updateDisplay();
    }

    function getCurrentData() {
        return currentMode === 'vocab' ? vocabList : expressionList;
    }

    function updateDisplay() {
        const data = getCurrentData();
        const item = data[currentIndex];
        document.getElementById('display-text').innerText = item.text;
        document.getElementById('category').innerText = item.cat;
        document.getElementById('progress').innerText = `Progress: ${currentIndex + 1} / ${data.length}`;
        document.getElementById('feedback-box').style.display = 'none';
    }

    function speakText() {
        const text = getCurrentData()[currentIndex].text;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
    }

    function toggleRecord() {
        if (isRecording) {
            recognition.stop();
        } else {
            isRecording = true;
            document.getElementById('record-btn').classList.add('recording');
            recognition.start();
        }
    }

    function showFeedback(userSpeech, target) {
        const box = document.getElementById('feedback-box');
        box.style.display = 'block';
        
        if (userSpeech === target) {
            box.style.background = '#d1fae5';
            box.style.color = '#065f46';
            box.innerText = "Excellent! Perfect pronunciation.";
        } else if (target.includes(userSpeech) || userSpeech.length > target.length * 0.6) {
            box.style.background = '#fef3c7';
            box.style.color = '#92400e';
            box.innerHTML = `Good. You said: "<i>${userSpeech}</i>"`;
        } else {
            box.style.background = '#fee2e2';
            box.style.color = '#991b1b';
            box.innerHTML = `Try again. Detected: "<i>${userSpeech}</i>"`;
        }
    }

    function nextItem() {
        const data = getCurrentData();
        if (currentIndex < data.length - 1) {
            currentIndex++;
            updateDisplay();
        }
    }

    function prevItem() {
        if (currentIndex > 0) {
            currentIndex--;
            updateDisplay();
        }
    }

    // Initialize
    initRecognition();
    updateDisplay();
</script>

</body>
</html>
